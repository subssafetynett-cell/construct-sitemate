# Optional: publish Postgres, API, and SPA to localhost for development.
#
#   docker compose -f docker-compose.yaml -f docker-compose.local.yaml up -d --build
#
# Coolify and similar hosts should use `docker-compose.yaml` only so nothing binds
# fixed host ports (8080/4000/5432 often collide with the platform or other stacks).

services:
  db:
    ports:
      - "5432:5432"
  backend:
    ports:
      - "4000:4000"
  frontend:
    ports:
      - "8080:80"
