# Local development overlay — merge with docker-compose.yaml:
#   docker compose -f docker-compose.yaml -f docker-compose.local.yaml up -d --build
# Or use: ./scripts/docker-up.sh

services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: site-mate_db
    restart: always
    environment:
      POSTGRES_USER: safetyuser
      POSTGRES_PASSWORD: safetypassword
      POSTGRES_DB: safetyapp_db
    ports:
      # 5435 avoids clashing with other local stacks on 5434 and default Postgres on 5432.
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetyuser -d safetyapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: site-mate_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_RELAY_HOST: ${SMTP_RELAY_HOST:-}
      MP_SMTP_RELAY_PORT: ${SMTP_RELAY_PORT:-587}
      MP_SMTP_RELAY_STARTTLS: ${SMTP_RELAY_STARTTLS:-1}
      MP_SMTP_RELAY_AUTH: ${SMTP_RELAY_AUTH:-plain}
      MP_SMTP_RELAY_USERNAME: ${SMTP_USER:-}
      MP_SMTP_RELAY_PASSWORD: ${SMTP_PASS:-}

  backend:
    container_name: site-mate_backend
    environment:
      NODE_ENV: development
      APP_URL: ${APP_URL:-http://localhost:8082}
      DATABASE_URL: postgresql://safetyuser:safetypassword@db:5432/safetyapp_db?schema=public
      DIRECT_URL: postgresql://safetyuser:safetypassword@db:5432/safetyapp_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-do-not-use-in-production}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Sitemate <no-reply@localhost>}
      SMTP_RELAY_HOST: ${SMTP_RELAY_HOST:-}
      SMTP_RELAY_PORT: ${SMTP_RELAY_PORT:-587}
      REDIS_URL: redis://redis:6379
      DASHBOARD_CACHE_TTL_SEC: ${DASHBOARD_CACHE_TTL_SEC:-60}
    ports:
      - "4002:4000"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      redis:
        condition: service_healthy

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: site-mate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    container_name: site-mate_frontend
    ports:
      - "8082:80"

volumes:
  postgres_data:
